<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <!-- App is bilingual via its own i18n toggle. Disable browser auto-translation,
         which rewrites React-managed text nodes (wrapping them in <font> tags) and
         causes "removeChild" crashes + garbled labels (e.g. "Dansal" → "Dancehall"). -->
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1b3a72" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Poson Route Guidance — Anuradhapura</title>
  </head>
  <body class="notranslate">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
